# ViTransfer-TVP Docker Compose
# Video Production Review Platform & CRM
#
# This compose file pulls pre-built images from Docker Hub.
# For building from source locally while keeping `docker compose up -d --build`,
# create a local-only `docker-compose.override.yml` (gitignored) that adds `build:`
# for the `app` and `worker` services.
#
# Quick Start:
# 1. Copy .env.example to .env and configure your settings
# 2. Run: docker compose up -d
# 3. Access: http://localhost:4321 (or your configured APP_PORT)
# 4. Login with your ADMIN_EMAIL and ADMIN_PASSWORD from .env
#
# Documentation: https://github.com/thinkvp/ViTransfer-TVP

services:
  postgres:
    image: postgres:17-alpine
    container_name: vitransfer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vitransfer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-vitransfer}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - vitransfer-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vitransfer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


  redis:
    image: redis:8-alpine
    container_name: vitransfer-redis
    restart: unless-stopped
    command: >-
      redis-server
      --appendonly yes
      --appendfsync everysec
      --no-appendfsync-on-rewrite yes
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --save 300 100
      --rdbcompression yes
      --requirepass "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
    volumes:
      - redis-data:/data
    networks:
      - vitransfer-internal
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


  app:
    image: thinkvp/vitransfer-tvp-app:${VITRANSFER_IMAGE_TAG:-latest}
    container_name: vitransfer-app
    restart: unless-stopped
    user: "911:911"
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      TZ: ${TZ:-UTC}
      DATABASE_URL: postgresql://${POSTGRES_USER:-vitransfer}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vitransfer}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      STORAGE_ROOT: /app/uploads
      ACCOUNTING_STORAGE_ROOT: /app/accounting
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL is required in .env file}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required in .env file}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      SHARE_TOKEN_SECRET: ${SHARE_TOKEN_SECRET:?SHARE_TOKEN_SECRET is required}
      HTTPS_ENABLED: ${HTTPS_ENABLED:-false}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
      # QuickBooks Online (optional - pull only)
      QBO_CLIENT_ID: ${QBO_CLIENT_ID:-}
      QBO_CLIENT_SECRET: ${QBO_CLIENT_SECRET:-}
      QBO_REALM_ID: ${QBO_REALM_ID:-}
      QBO_REFRESH_TOKEN: ${QBO_REFRESH_TOKEN:-}
      QBO_SANDBOX: ${QBO_SANDBOX:-false}
      QBO_MINOR_VERSION: ${QBO_MINOR_VERSION:-75}
      QBO_REDIRECT_URI: ${QBO_REDIRECT_URI:-}

      # Dropbox storage (optional)
      DROPBOX_APP_KEY: ${DROPBOX_APP_KEY:-}
      DROPBOX_APP_SECRET: ${DROPBOX_APP_SECRET:-}
      DROPBOX_REFRESH_TOKEN: ${DROPBOX_REFRESH_TOKEN:-}
      DROPBOX_ROOT_PATH: ${DROPBOX_ROOT_PATH:-}

      # Stripe Checkout (optional)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    ports:
      - "${APP_PORT:-4321}:4321"
    volumes:
      - uploads:/app/uploads
      - accounting-data:/app/accounting
    networks:
      - vitransfer-internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4321/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5m


  worker:
    image: thinkvp/vitransfer-tvp-worker:${VITRANSFER_IMAGE_TAG:-latest}
    container_name: vitransfer-worker
    restart: unless-stopped
    user: "911:911"
    init: true
    command: npm run worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    environment:
      NODE_ENV: production
      TZ: ${TZ:-UTC}
      # DEBUG_WORKER: "true"  # Uncomment for verbose FFmpeg and worker debug logs

      # Worker CPU / concurrency tuning (optional)
      # - In containers, `os.cpus().length` can reflect host CPU rather than the container quota.
      # - Set CPU_THREADS to match the worker container's CPU allocation (threads), e.g. 2, 4, 8.
      # CPU_THREADS: "4"
      # Force number of concurrent video jobs (default is computed from CPU_THREADS/host threads).
      # VIDEO_WORKER_CONCURRENCY: "1"
      # Force FFmpeg threads per job (default is computed to keep video/sprite FFmpeg usage ~50%).
      # FFMPEG_THREADS_PER_JOB: "2"
      DATABASE_URL: postgresql://${POSTGRES_USER:-vitransfer}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vitransfer}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      STORAGE_ROOT: /app/uploads
      ACCOUNTING_STORAGE_ROOT: /app/accounting
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      # QuickBooks Online (optional - pull only)
      QBO_CLIENT_ID: ${QBO_CLIENT_ID:-}
      QBO_CLIENT_SECRET: ${QBO_CLIENT_SECRET:-}
      QBO_REALM_ID: ${QBO_REALM_ID:-}
      QBO_REFRESH_TOKEN: ${QBO_REFRESH_TOKEN:-}
      QBO_SANDBOX: ${QBO_SANDBOX:-false}
      QBO_MINOR_VERSION: ${QBO_MINOR_VERSION:-75}
      QBO_REDIRECT_URI: ${QBO_REDIRECT_URI:-}

      # Dropbox storage (optional)
      DROPBOX_APP_KEY: ${DROPBOX_APP_KEY:-}
      DROPBOX_APP_SECRET: ${DROPBOX_APP_SECRET:-}
      DROPBOX_REFRESH_TOKEN: ${DROPBOX_REFRESH_TOKEN:-}
      DROPBOX_ROOT_PATH: ${DROPBOX_ROOT_PATH:-}
    volumes:
      - uploads:/app/uploads
      - accounting-data:/app/accounting
    networks:
      - vitransfer-internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -v grep | grep -q 'npm run worker' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 6m


volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  uploads:
    driver: local
  accounting-data:
    driver: local


networks:
  vitransfer-internal:
    driver: bridge
